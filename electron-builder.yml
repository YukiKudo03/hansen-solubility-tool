appId: com.hansen-solubility.tool
productName: Hansen溶解度パラメータ評価ツール
copyright: Copyright © 2026

directories:
  output: out
  buildResources: build

files:
  - dist/**/*
  - node_modules/**/*
  - package.json

extraMetadata:
  main: dist/main/main/main.js

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: build/icon.ico
  signAndEditExecutable: false

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  icon: build/icon.icns
  category: public.app-category.developer-tools
  hardenedRuntime: true

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: build
  category: Science
  maintainer: YukiKudo03

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  installerLanguages:
    - ja
  language: 1041

asar: true

asarUnpack:
  - "**/*.node"
  - "**/better-sqlite3/**"

publish:
  provider: github
  owner: YukiKudo03
  repo: hansen-solubility-tool
