<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="#1e40af" />

  <!-- Hansen sphere (3D-like) -->
  <ellipse cx="128" cy="128" rx="80" ry="80" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.6" />
  <ellipse cx="128" cy="128" rx="80" ry="40" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.6" transform="rotate(60 128 128)" />
  <ellipse cx="128" cy="128" rx="80" ry="40" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.6" transform="rotate(-60 128 128)" />

  <!-- Inner sphere highlight -->
  <circle cx="128" cy="128" r="35" fill="#3b82f6" opacity="0.4" />
  <circle cx="115" cy="115" r="15" fill="#93c5fd" opacity="0.5" />

  <!-- Axes labels -->
  <text x="128" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#e0f2fe">δD</text>
  <text x="215" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#e0f2fe">δP</text>
  <text x="45" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#e0f2fe">δH</text>

  <!-- HSP text -->
  <text x="128" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff">HSP</text>
</svg>
